name: 'Pedant Supply Chain Check'
description: 'Detect dependency capability changes and tag-swap attacks using pedant attestations'

inputs:
  baseline-path:
    description: 'Path to stored baselines'
    default: '.pedant/baselines'
  fail-on:
    description: 'Fail on: hash-mismatch, new-capability, new-dependency, or none'
    default: 'hash-mismatch'

outputs:
  status:
    description: 'Overall result: clean, new-dependency, capability-change, hash-mismatch'
    value: ${{ steps.scan.outputs.status }}
  report:
    description: 'Path to the full JSON report'
    value: ${{ steps.scan.outputs.report }}

runs:
  using: 'composite'
  steps:
    - name: Build pedant from action source
      shell: bash
      run: |
        if command -v pedant &>/dev/null; then
          echo "pedant already installed"
        else
          PEDANT_ROOT="$(cd "${{ github.action_path }}/../../.." && pwd)"
          cargo install --path "$PEDANT_ROOT/pedant" --locked
        fi

    - name: Verify supply chain baselines
      id: scan
      shell: bash
      run: pedant supply-chain verify --baseline-path "${{ inputs.baseline-path }}" --fail-on "${{ inputs.fail-on }}"

[advisories]
ignore = [
    # instant is unmaintained but pulled transitively via notify-types -> notify v7.
    # No safe upgrade available; notify has not migrated off it yet.
    "RUSTSEC-2024-0384",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
    "ISC",
    "BSD-3-Clause",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
